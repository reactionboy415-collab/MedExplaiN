  <head>

    <!-- Primary SEO Metadata -->
    <title>MedExplaiN AI — Medical Report & Prescription Explainer</title>
    <meta name="description" content="Upload medical reports, lab blood tests, pharmacist instructions, or handwritten prescriptions to instantly translate complex medical terms into plain, lay-friendly summaries." />

    <meta property="og:url" content="https://medexplain-ai.studio/build" />

    <!-- PWA & Device Config -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#2563eb" />
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🩺</text></svg>" />

    <!-- Structured JSON-LD Data for SoftwareApplication & FAQ -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "SoftwareApplication",
        "name": "MedExplaiN AI",
        "operatingSystem": "Web, iOS, Android",
        "applicationCategory": "HealthApplication",
        "description": "An AI utility for patient health literacy that converts handwritten doctor scripts, medication containers, and lab profiles into simplified patient languages.",
        "offers": {
          "@type": "Offer",
          "price": "25.00",
          "priceCurrency": "USD"
        }
      }
    </script>
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "FAQPage",
        "mainEntity": [
          {
            "@type": "Question",
            "name": "Can MedExplaiN AI replace my medical doctor?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "No, absolutely not. MedExplaiN AI is strictly an educational tool designed to help patients understand complex reports, terminology, and medicine structures. It is not an active diagnostic platform and is never a replacement for a licensed healthcare professional's assessment, diagnostic reasoning, or treatment recommendations."
            }
          },
          {
            "@type": "Question",
            "name": "Is my personal medical data safe on this platform?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Yes, privacy is our highest priority. All image and report processing happens in high-security, server-side containers. Your files and base64 strings are never stored or logged in databases, and are immediately deleted upon completing the analysis request."
            }
          }
        ]
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
